# Claims registry for apps/geo_lift_slides.html — read by apps/verify_geo_deck.py.
#
# Every number the deck states maps to: the slide(s) that state it (anchored by the
# section's data-t, never by position), the exact rendered string, an expression
# recomputed from the baked DATA bundle, and/or the shard token it must equal.
# No new number enters the deck without an entry here.
#
# Two sources of truth, deliberately both checked where possible:
#   expr  -> the DATA bundle baked into the deck (what the live charts show)
#   shard -> book/build/results/nb07*.json (what the prose was token-substituted from)
# The posterior-draw arrays in DATA are a 1,200-draw subsample of the notebook run,
# so expr tolerances on posterior summaries are wider than shard tolerances.
#
# defect: <note> marks a number the remediation plan has already convicted; the
# harness reports it as WARN until the fixing phase lands, then the entry is updated.

