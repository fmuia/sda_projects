# ---- the €4M rollout (slides 26-27), reframed 2026-07-21 -----------------------------
# The metro is NOT treated as "chosen for promise" (that would open the backdoor the deck
# deliberately parks on slide 1). So there is no systematic "selection haircut": the only
# sign-known discount is SATURATION = (4000/2250)^(beta-1), beta in [0.6, 0.8], 2250 =
# 30 markets x €75k = the pilot-intensity national budget. Market-representativeness is
# symmetric uncertainty (widens the band, no mean shift). beta is a client-owned input;
# these entries pin the arithmetic, not truth. The required-delta / plausible-delta
# comparison now lives in the "Measure it, don't guess it" fold-out (demoted from a slide).
- id: rollout_delta_zone_provable
  # upper edge of the required-delta band (tau at the interval bottom)
  slides: ["What €4M actually buys"]
  text: "[0.64, 1.10]"
  expr: "(75/0.35) / 195"
  value: 1.099
  tol: 0.005

- id: rollout_delta_zone_disproven
  # lower edge of the required-delta band (tau at the interval top)
  slides: ["What €4M actually buys"]
