# ---- Phase 3: the rollout ledger and the portfolio ---------------------------------
- id: rollout_reach
  slides: ["What €4M actually buys"]
  texts: ["53 pilot-budgets", "€4M"]
  expr: "4000 / 75"
  value: 53.3
  tol: 0.1

- id: rollout_p_at_delta1
  slides: ["The €4M decision"]
  # spend-proportional reach preserves the iROAS bar, so P(rollout pays | delta=1)
  # is the SAME event as the pilot's P(pays): tau > 4000/(0.35*R) = 214.3
  text: "same P(pays) = 0.78"
  expr: "mean(tot_ar1 > 4000 / (0.35 * 4000 / 75))"
  value: 0.78
  tol: 0.025
  shard: nb07.p_go
  tol_shard: 0.005

- id: rollout_breakeven_delta
  slides: []           # JS-filled span rollBE
  expr: "4000 / (0.35 * (4000 / 75) * mean(tot_ar1))"
  value: 0.82
  tol: 0.02

- id: rollout_voi_peak
  slides: []           # JS-filled span rollVoiBE (rounded to nearest 10)
  # peak over the delta grid sits near break-even; assert the delta=0.8 point, where
  # E[net] < 0 so VOI = E[max(gain - cost, 0)] outright (no commit-now term).
  # NB the env's max() is np.max — do not use its two-argument scalar form in exprs.
  expr: "mean(np.maximum(0.35 * 0.8 * (4000/75) * tot_ar1 - 4000, 0))"
  value: 322
  tol: 45

- id: rollout_voi_vs_pilot
  slides: ["The €4M decision"]
  text: "€2k"
  expr: "mean(np.maximum(0.35 * tot_ar1 - 75, 0)) - max(mean(0.35 * tot_ar1) - 75, 0)"
  value: 2.5
  tol: 0.6

