# Claims registry for apps/labs_slides.html — read by apps/verify_labs_deck.py.
#
# Every fact the deck states maps to: the slide(s) that state it (anchored by the
# section's data-t, never by position), the exact rendered string, and the key in
# apps/labs_deck_data.json that pins it to a public source URL + retrieval date.
# No new number enters the deck without an entry here.
#
# Unlike geo_claims.yaml there is no shard cross-check: this deck's source of truth
# IS the pinned data file (blog posts + the Criteo dataset page). Where a number is
# also baked into the chart bundle, an expr/value pair re-checks the DATA copy.
#
# source: <key> — the labs_deck_data.json entry whose source_url covers this claim;
# the verifier fails if the key is missing there, so provenance cannot silently rot.

