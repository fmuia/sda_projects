name: causal-marketing-pymc CI

# GitHub Actions only reads workflows from the repository root (this monorepo is
# fmuia/sda_projects). The project lives in causal-marketing-pymc/, so every job
# runs there via `defaults.run.working-directory`, and a `paths` filter keeps the
# suite from running on changes elsewhere in the repo. Branch is `main`.
on:
  push:
    branches: [main]
    paths: ["causal-marketing-pymc/**"]
  pull_request:
    paths: ["causal-marketing-pymc/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: causal-marketing-pymc

jobs:
  # Fast lane: shared-package unit tests (incl. the pymc-bart CATE gotcha guard)
  # plus the kernelspec-drift guard. `uv sync` now installs the `dev` dependency
  # group (pytest/nbmake) automatically.
  package-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync core environment (pymc>=6, incl. dev group)
        run: uv sync --python 3.12
      - name: Package unit tests + kernelspec-drift guard
        run: uv run --python 3.12 pytest tests/test_package.py tests/test_notebooks.py::test_notebook_kernelspec -q

  # Full lane: execute every notebook headless in FAST mode, across both envs.
  notebook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps for pymc-marketing[dag] (graphviz)
        run: sudo apt-get update && sudo apt-get install -y graphviz graphviz-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build core environment (pymc>=6)  ·  notebooks 00-05, 07
        run: uv sync --python 3.12

      - name: Build legacy environment (pymc<6)  ·  notebooks 06, 08-11
        run: |
          uv venv .venv-legacy --python 3.12
          # install from the LOCK (exact pins incl. pygraphviz, so pymc-marketing[dag]
          # is covered) — identical to `make env-legacy`, matching committed outputs.
          uv pip install --python .venv-legacy/bin/python -r requirements-legacy.lock
          uv pip install --python .venv-legacy/bin/python -e . --no-deps

      # Truth-recovery guards for the CausalPy DiD/RDD/ITS/IV wrappers (nb08-11).
      # This is the one job that builds .venv-legacy, so the legacy suite gates here
      # (import-skipped under the core env) — a wrapper returning a fitted-but-wrong
      # object now fails CI instead of passing silently.
      - name: Legacy estimator truth-recovery guards (pymc<6)
        env:
          CMP_FAST: "1"
        run: .venv-legacy/bin/python -m pytest tests/test_estimators_legacy.py -q

      - name: Register both Jupyter kernels
        run: |
          .venv/bin/python -m ipykernel install --user --name cmp-core --display-name "Python (cmp core, pymc6)"
          .venv-legacy/bin/python -m ipykernel install --user --name cmp-legacy --display-name "Python (cmp legacy, pymc5)"

      # Real-data cache for notebooks 07b/11b (cmp.data loaders): the Criteo file is a
      # 311 MB one-time download + one full parse, so cache ~/.cache/cmp across runs.
      # Bump the key suffix if a dataset version in src/cmp/data.py ever changes.
      - name: Cache real datasets for notebooks 07b/11b
        uses: actions/cache@v4
        with:
          path: ~/.cache/cmp
          key: cmp-real-data-v1

      # CMP_STRICT_KERNELS=1 turns a missing-kernel skip into a failure, so a broken
      # legacy env can't silently pass 5 notebooks.
      - name: Execute all notebooks headless (FAST=1, strict kernels)
        env:
          CMP_FAST: "1"
          CMP_STRICT_KERNELS: "1"
        run: uv run --python 3.12 pytest tests/test_notebooks.py -q -p no:cacheprovider
